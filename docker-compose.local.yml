services:
  php:
    build:
      context: .
      dockerfile: .docker/Dockerfile
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./.docker/conf/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
      - ./.docker/conf/php/xdebug.ini:/usr/local/etc/php/conf.d/xdebug.ini:ro
    depends_on:
      - db
    networks:
      - appnet

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8084:80"
    volumes:
      - ./:/var/www/html
      - ./.docker/conf/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - appnet

  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-toptancimburada}
      MYSQL_USER: ${DB_USERNAME:-toptancimburada}
      MYSQL_PASSWORD: ${DB_PASSWORD:-123456789}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    ports:
      - "3307:3306"
    volumes:
      - ./.docker/conf/mysql:/var/lib/mysql
    networks:
      - appnet

networks:
  appnet:
    driver: bridge
