version: '3'

networks:
    backend:
        driver: bridge

services:
    web:
        image: nginx
        volumes:
            - ./.docker/conf/nginx/default.conf:/etc/nginx/conf.d/default.conf
            - .:/var/www/html
        ports:
            - "8083:80"
        restart: always
        depends_on:
            - php
        networks:
            - backend
    php:
        build: .docker
        restart: always
        volumes:
            - ./.docker/conf/php/php.ini:/usr/local/etc/php/conf.d/php.ini
            - ./.docker/conf/php/xdebug.ini:/usr/local/etc/php/conf.d/xdebug.ini
            - .:/var/www/html
        networks:
            - backend
    db:
        image: postgres:latest
        restart: always
        environment:
            - POSTGRES_DB=toptancimburada
            - POSTGRES_USER=toptancimburada
            - POSTGRES_PASSWORD=123456789
        ports:
            - "5453:5432"
        volumes:
            - ./.docker/conf/postgres/:/docker-entrypoint-initdb.d/
        networks:
            - backend
