name: Deploy API
on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Sync to server
        run: |
          rsync -az --delete --exclude='.git' --exclude='.env' \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/tbpanel/api/src/

      - name: Deploy
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'SSH'
            cd /opt/tbpanel
            docker compose up -d --build api_app api_web api_queue api_scheduler
            docker compose exec -T api_app php artisan migrate --force
            docker compose exec -T api_app php artisan config:cache
            docker compose exec -T api_app php artisan route:cache || true
            docker compose exec -T api_app php artisan storage:link || true
          SSH
